name: Deploy to Minikube

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Build Docker image
      run: docker build -t my-project .
    
    - name: Test container
      run: |
        docker run -d -p 5000:5000 my-project
        sleep 5
        curl http://localhost:5000/health